spec_version: 1
name: data_curation_lab
type: space
runtime: fastapi
app: server.app:app
port: 7860

environment:
  name: "DataCurationLab"
  description: "Advanced RL environment for multi-step data cleaning, featuring an Auto-Revert system and 6-stage pipeline."
  entrypoint: "server.environment:DataCurationEnv"

tasks:
  - id: "task_1"
    name: "Task 1"
    description: "Breast Cancer: Simple numeric imputation with MCAR noise."
    difficulty: "easy"
    grader: "tasks.task_1.grader:DataCurationGrader"
  - id: "task_2"
    name: "Task 2"
    description: "Titanic: Mixed-type cleaning and outlier removal."
    difficulty: "medium"
    grader: "tasks.task_2.grader:DataCurationGrader"
  - id: "task_3"
    name: "Task 3"
    description: "Ames Housing: Correlated missingness challenge."
    difficulty: "medium"
    grader: "tasks.task_3.grader:DataCurationGrader"
  - id: "task_4"
    name: "Task 4"
    description: "Used Cars: Severe outliers and skewed data."
    difficulty: "hard"
    grader: "tasks.task_4.grader:DataCurationGrader"
  - id: "task_5"
    name: "Task 5"
    description: "Zomato: High-dimensional mixed data challenge."
    difficulty: "hard"
    grader: "tasks.task_5.grader:DataCurationGrader"
