spec_version: 1
name: data_curation_lab
type: space
runtime: fastapi
app: server.app:app
port: 7860

environment:
  name: "DataCurationLab"
  description: "Advanced RL environment for multi-step data cleaning, featuring an Auto-Revert system and 6-stage pipeline."
  entrypoint: "server.environment:DataCurationEnv"

tasks:
  - id: "easy"
    name: "Task Easy"
    description: "Breast Cancer: Simple numeric imputation with MCAR noise."
    difficulty: "easy"
    grader:
      type: llm
      prompt_template: "Score the data curation 0.0 to 1.0 based on the transformation described in the logs. Focus on imputation quality and numeric consistency."
  - id: "medium"
    name: "Task Medium"
    description: "Titanic: Mixed-type cleaning and outlier removal."
    difficulty: "medium"
    grader:
      type: llm
      prompt_template: "Score the data curation 0.0 to 1.0 based on the transformation described in the logs. Look for outlier removal and correctly encoded categoricals."
  - id: "hard"
    name: "Task Hard"
    description: "Ames Housing: Correlated missingness challenge."
    difficulty: "hard"
    grader:
      type: llm
      prompt_template: "Score the data curation 0.0 to 1.0 based on the transformation described in the logs. Evaluate how the agent handled high-dimensional missingness."
